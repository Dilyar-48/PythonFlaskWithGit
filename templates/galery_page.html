{% extends "base.html" %}

{% block content %}
    <div style="width: 100%; text-align: center;">
        <div id="myCarousel" class="carousel slide w-50" data-bs-ride="carousel">
              <h1>Пейзажи Марса</h1>
              <div class="carousel-inner" role="listbox" data-interval="100">
                    {% for pic in pictures %}
                        {% if loop.first %}
                            <div class="carousel-item active">
                        {% else %}
                            <div class="carousel-item">
                        {% endif %}
                          <img class="d-block w-100" src=../{{pic}} alt="Cлайд {{loop.index}}">
                        </div>
                    {% endfor %}
              </div>
              <a class="carousel-control-prev" href="#myCarousel" role="button" data-bs-target="#myCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Предыдущий</span>
              </a>
              <a class="carousel-control-next" href="#myCarousel" role="button" data-bs-target="#myCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Следующий</span>
              </a>
              <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
              integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
              crossorigin="anonymous"></script>
              <form method="post" enctype="multipart/form-data" class="login_form">
                <div class="form-group" style="margin-left: 30%; width: 40%; text-align: left; border: 1px solid gray; padding-top: 1%; padding-bottom: 3%; padding-left: 3%">
                    <label for="photo">Выберите картинку</label>
                    <input type="file" class="form-control-file" id="photo" name="file"><br><br>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </div>
              </form>
        </div>
    </div>
{% endblock %}
