<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <title>{{ title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
                        crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="../../static/css/style_to_second_page.css" />
</head>
    <body>
        <div class="alert alert-primary" role="alert" style='color: black; background-color: MintCream; border: 1px solid MintCream; border-radius: 50px; clear: both; height: 85px; display: flex;' >
            <h1 style="width: 50%; font-size: 40px;">Миссия Колонизация Марса</h1>
            {% if current_user.is_authenticated %}
                <a class="navbar-brand" href="/logout" style="color: #000; width: 35%;">{{ current_user.name }}</a>
            {% else %}
                <p style="width: 35%;">
                    <a class="btn btn-primary " href="/register">Зарегистрироваться</a>
                    <a class="btn btn-success" href="/login">Войти</a>
                </p>
            {% endif %}
                <h6 align="right" style="float: left; width: 15%;">Mars One</h6>
        </div>
        <h4>И на Марсе будут яблони цвести!</h4>
        <main role="main" class="container" style="margin: 0 auto;">
        {% block content %}{% endblock %}
        </main>
    </body>
</html>
